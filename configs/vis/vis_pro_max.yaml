run_name: vis_v12_pro_max
adapter_type: vis

_gigachat: &gigachat
  type: gigachat
  base_url: https://gigachat-ift.sberdevices.delta.sbrf.ru/v1
  timeout_seconds: 120
  verify_ssl: false
  cert_file: .certs/cert_agents.txt
  key_file: .certs/key_agents.txt
  extra_params:
    profanity_check: false
    repetition_penalty: 1

task_provider:
  <<: *gigachat
  name: gigachat-pro
  model: GigaChat-2-Pro

reflection_provider:
  <<: *gigachat
  name: gigachat-max
  model: GigaChat-2-Max

mutator:
  type: gepa_default
  temperature: 0.7
  reflection_prompt_template: |
    Ассистенту были даны следующие инструкции для выполнения задачи:
    ```
    <curr_param>
    ```

    Ниже приведены примеры входных данных задачи, ответы ассистента на каждый из них, а также обратная связь о том, как ответы можно улучшить:
    ```
    <side_info>
    ```

    Твоя задача — написать улучшенные инструкции для ассистента.

    Внимательно прочитай входные данные, определи их формат и сформулируй подробное описание задачи, которую нужно решить.

    Изучи все ответы ассистента и соответствующую обратную связь. Проанализируй текущие инструкции критически:
    - Если существующее правило привело к ошибкам — перепиши или убери его.
    - Объедини дублирующиеся или противоречивые указания.
    - Добавляй новое правило только если паттерн ошибки не покрыт существующими правилами.
    - Каждое правило должно быть конкретным и применимым — без расплывчатых формулировок.
    - Не удаляй и не изменяй правила, которые не упоминаются в обратной связи.
    - Изменяй только те правила, которые напрямую привели к ошибкам в примерах.

    КОМПАКТНОСТЬ (применяй при каждом переписывании):
    - Никогда не УДАЛЯЙ правило или факт — только ОБЪЕДИНЯЙ дубликаты. Если правило А и правило Б выражают одну и ту же логику, объедини их в одно. Объединённое правило должно покрывать все случаи, которые покрывали А и Б по отдельности.
    - Если маппинг (например, "X = документ Y") встречается и в разделе правил, и в каталоге документов — оставь его ТОЛЬКО в записи каталога. Не дублируй между разделами.
    - Убирай примеры, которые лишь повторяют то, что и так сказано в правиле, но сохраняй примеры, которые иллюстрируют граничные случаи или устраняют неоднозначность.
    - Предпочитай таблицы или структурированные списки многословным описаниям для маппинга документов.

    Выяви всю специфическую и доменную фактическую информацию о задаче и сохрани её в инструкции — в будущем ассистент может не иметь к ней доступа.

    Напиши улучшенные инструкции внутри блока ```.

optimization:
  max_calls: 3000
  patience: 30
  minibatch_size: 7
  candidate_selection_strategy: pareto
  use_merge: true
  eval_temperature: 0.0
  seed: 0

seed_prompts:
  routing_logic: ВиС/Промпт/routing_logic.txt
  doc_catalog: ВиС/Промпт/doc_catalog.txt

module_selector: round_robin

train: ВиС/datasets/train3.json
val: ВиС/datasets/val3.json
test:
  - ВиС/Датасеты/dataset_ViS_v12.json
  - ВиС/Датасеты/test_dataset_modification_v2.json

heatmap_template: ВиС/error_heatmap.xlsx
run_dir: artifacts/gepa_pipeline
